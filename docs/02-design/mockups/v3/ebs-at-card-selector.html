<!DOCTYPE html>
<!-- Style Reference: Brutalist B&W — AT Manual Card Selector Modal (AT-C01~C07) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>EBS AT — Card Selector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; background: #fff; display: inline-block; }

  .component {
    width: 720px;
    background: #111;
    border: 3px solid #000;
    font-family: 'Courier New', 'Lucida Console', monospace;
    display: flex;
    flex-direction: column;
  }

  /* HEADER: back + selected + ok */
  .cs-header {
    height: 72px;
    background: #000;
    border-bottom: 2px solid #333;
    display: flex; align-items: center;
    padding: 0 12px; gap: 10px;
    flex-shrink: 0;
  }
  .cs-back {
    height: 48px; min-width: 60px;
    border: 2px solid #fff; background: transparent; color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px; font-weight: 900; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cs-back:hover { background: #222; }

  .cs-selected-area {
    flex: 1; display: flex; align-items: center; gap: 6px; padding: 0 4px;
    min-height: 52px;
  }
  .cs-sel-label {
    font-size: 9px; color: #666; letter-spacing: 0.1em; text-transform: uppercase;
    writing-mode: vertical-rl; transform: rotate(180deg);
    margin-right: 4px;
  }
  .cs-card {
    width: 36px; height: 50px;
    border: 2px solid #fff; border-radius: 2px;
    background: #fff; color: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 11px; font-weight: 900; line-height: 1.1;
    box-shadow: 0 0 0 1px #000;
    flex-shrink: 0;
  }
  .cs-card__rank { font-size: 13px; font-weight: 900; }
  .cs-card__suit { font-size: 10px; }
  .cs-card--empty {
    border: 2px dashed #444; background: #1a1a1a;
    color: #444; box-shadow: none;
  }
  .cs-card--empty span { font-size: 18px; color: #333; }

  .cs-ok {
    height: 48px; min-width: 80px;
    border: 2px solid #fff; background: #fff; color: #000;
    font-family: 'Courier New', monospace;
    font-size: 13px; font-weight: 900; letter-spacing: 0.1em;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 4px 4px 0 #333;
  }
  .cs-ok:hover { background: #e0e0e0; }

  /* SUIT ROWS */
  .suit-section {
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }
  .suit-section:last-child { border-bottom: none; }
  .suit-label-row {
    height: 22px; background: #000;
    display: flex; align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid #333;
  }
  .suit-label {
    font-size: 13px; font-weight: 900; letter-spacing: 0.05em;
    color: #fff;
  }
  .suit-label--spade { color: #fff; }
  .suit-label--heart { color: #ccc; }
  .suit-label--diamond { color: #aaa; }
  .suit-label--club { color: #888; }

  .card-grid-row {
    display: flex; padding: 6px 8px; gap: 4px;
    background: #111;
  }
  .gc {
    flex: 1; height: 56px;
    border: 1.5px solid #444; border-radius: 2px;
    background: #fff; color: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 11px; font-weight: 900; line-height: 1.1;
    cursor: pointer;
    transition: transform 0.05s, box-shadow 0.05s;
    box-shadow: 1px 1px 0 #000;
    min-width: 0;
    position: relative;
  }
  .gc:hover { transform: translateY(-2px); box-shadow: 1px 3px 0 #000; }
  .gc:active { transform: translateY(0); background: #000; color: #fff; }
  .gc__r { font-size: 12px; font-weight: 900; }
  .gc__s { font-size: 9px; }

  /* Selected state */
  .gc--selected {
    background: #555; color: #fff;
    border-color: #aaa;
    box-shadow: none;
  }
  .gc--selected::after {
    content: '✓';
    position: absolute; top: 1px; right: 2px;
    font-size: 8px; color: #fff; font-weight: 900;
  }

  /* Used / disabled state */
  .gc--used {
    background: #1a1a1a; color: #444;
    border-color: #333; cursor: not-allowed;
    box-shadow: none; opacity: 0.5;
  }
  .gc--used .gc__r, .gc--used .gc__s { text-decoration: line-through; }
</style>
</head>
<body>
<div class="component">

  <!-- HEADER -->
  <div class="cs-header">
    <button class="cs-back">◀</button>
    <div class="cs-selected-area">
      <span class="cs-sel-label">Selected</span>
      <div class="cs-card">
        <span class="cs-card__rank">7</span>
        <span class="cs-card__suit">♥</span>
      </div>
      <div class="cs-card">
        <span class="cs-card__rank">6</span>
        <span class="cs-card__suit">♠</span>
      </div>
      <div class="cs-card cs-card--empty"><span>—</span></div>
      <div class="cs-card cs-card--empty"><span>—</span></div>
    </div>
    <button class="cs-ok">OK ↵</button>
  </div>

  <!-- SPADES ROW -->
  <div class="suit-section">
    <div class="suit-label-row">
      <span class="suit-label suit-label--spade">♠ SPADES</span>
    </div>
    <div class="card-grid-row">
      <div class="gc gc--used"><span class="gc__r">A</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">K</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">Q</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">J</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">10</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">9</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">8</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">7</span><span class="gc__s">♠</span></div>
      <div class="gc gc--selected"><span class="gc__r">6</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">5</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">4</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">3</span><span class="gc__s">♠</span></div>
      <div class="gc"><span class="gc__r">2</span><span class="gc__s">♠</span></div>
    </div>
  </div>

  <!-- HEARTS ROW -->
  <div class="suit-section">
    <div class="suit-label-row">
      <span class="suit-label suit-label--heart">♥ HEARTS</span>
    </div>
    <div class="card-grid-row">
      <div class="gc"><span class="gc__r">A</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">K</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">Q</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">J</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">10</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">9</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">8</span><span class="gc__s">♥</span></div>
      <div class="gc gc--selected"><span class="gc__r">7</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">6</span><span class="gc__s">♥</span></div>
      <div class="gc gc--used"><span class="gc__r">5</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">4</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">3</span><span class="gc__s">♥</span></div>
      <div class="gc"><span class="gc__r">2</span><span class="gc__s">♥</span></div>
    </div>
  </div>

  <!-- DIAMONDS ROW -->
  <div class="suit-section">
    <div class="suit-label-row">
      <span class="suit-label suit-label--diamond">♦ DIAMONDS</span>
    </div>
    <div class="card-grid-row">
      <div class="gc"><span class="gc__r">A</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">K</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">Q</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">J</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">10</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">9</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">8</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">7</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">6</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">5</span><span class="gc__s">♦</span></div>
      <div class="gc gc--used"><span class="gc__r">4</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">3</span><span class="gc__s">♦</span></div>
      <div class="gc"><span class="gc__r">2</span><span class="gc__s">♦</span></div>
    </div>
  </div>

  <!-- CLUBS ROW -->
  <div class="suit-section">
    <div class="suit-label-row">
      <span class="suit-label suit-label--club">♣ CLUBS</span>
    </div>
    <div class="card-grid-row">
      <div class="gc"><span class="gc__r">A</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">K</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">Q</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">J</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">10</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">9</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">8</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">7</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">6</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">5</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">4</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">3</span><span class="gc__s">♣</span></div>
      <div class="gc"><span class="gc__r">2</span><span class="gc__s">♣</span></div>
    </div>
  </div>

</div>
</body>
</html>
