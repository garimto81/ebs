<!DOCTYPE html>
<!-- Component: Ticker — Standard (480×30px) -->
<!-- Style: B&W Monochrome, Scrolling Broadcast Bar -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<title>EBS Component — Ticker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #2a2a2a;
    --gray-900: #1a1a1a;
    --overlay-bg: rgba(15, 15, 15, 0.88);
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }

  html { background: #333; }

  body {
    display: inline-block;
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: var(--font-mono);
    color: var(--white);
  }

  .component {
    border: 2px solid #333;
    display: inline-block;
  }

  .component-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
    background: #111;
    padding: 5px 10px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* ── Ticker canvas ── */
  .ticker-canvas {
    width: 480px;
    height: 30px;
    background: var(--black);
    border-top: 2px solid var(--gray-700);
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* NEWS label */
  .ticker-label {
    font-family: var(--font-mono);
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray-600);
    padding: 0 10px;
    border-right: 1px solid var(--gray-800);
    white-space: nowrap;
    flex-shrink: 0;
    height: 100%;
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.4);
  }

  /* Scroll area */
  .ticker-scroll-area {
    flex: 1;
    overflow: hidden;
    position: relative;
    height: 100%;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    height: 100%;
    white-space: nowrap;
    animation: ticker-scroll 28s linear infinite;
  }

  @keyframes ticker-scroll {
    0%   { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  .ticker-item {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    color: var(--gray-300);
    padding: 0 20px 0 0;
    letter-spacing: 0.03em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .ticker-arrow {
    color: var(--gray-700);
    font-size: 7px;
    letter-spacing: 0.08em;
  }

  .ticker-highlight {
    color: var(--white);
    font-weight: 700;
  }

  .ticker-divider {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--gray-700);
    padding: 0 14px;
  }

  /* Right: static info */
  .ticker-right {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-500);
    padding: 0 10px;
    border-left: 1px solid var(--gray-800);
    white-space: nowrap;
    flex-shrink: 0;
    height: 100%;
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div class="component">
  <div class="component-label">TICKER — Standard</div>
  <div class="ticker-canvas">

    <!-- NEWS label -->
    <span class="ticker-label">NEWS</span>

    <!-- Scrolling content -->
    <div class="ticker-scroll-area">
      <div class="ticker-track">
        <span class="ticker-item">
          <span class="ticker-arrow">>>></span>
          <span class="ticker-highlight">Player X</span> wins ₩12,500 with Full House
        </span>
        <span class="ticker-divider">|</span>
        <span class="ticker-item">
          Next break in 15m
        </span>
        <span class="ticker-divider">|</span>
        <span class="ticker-item">
          <span class="ticker-highlight">Hand #247</span> — Day 2, Level 12
        </span>
        <span class="ticker-divider">|</span>
        <span class="ticker-item">
          Average stack: 37,500 · Players remaining: 8 of 120
        </span>
        <span class="ticker-divider">|</span>
        <span class="ticker-item">
          <span class="ticker-arrow">>>></span>
          <span class="ticker-highlight">Lee Junho</span> eliminated in 9th place
        </span>
        <span class="ticker-divider">|</span>
        <span class="ticker-item">
          Next break in 15m
        </span>
      </div>
    </div>

    <!-- Static right info -->
    <span class="ticker-right">Next Brk 15m</span>

  </div>
</div>
</body>
</html>
