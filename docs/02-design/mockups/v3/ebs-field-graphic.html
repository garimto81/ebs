<!DOCTYPE html>
<!-- Component: Field Graphic — Standard (200×60px) -->
<!-- Style: B&W Monochrome, Compact Overlay -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<title>EBS Component — Field Graphic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #2a2a2a;
    --gray-900: #1a1a1a;
    --overlay-bg: rgba(15, 15, 15, 0.88);
    --overlay-border: rgba(200, 200, 200, 0.35);
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }

  html { background: #333; }

  body {
    display: inline-block;
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: var(--font-sans);
    color: var(--white);
  }

  .component {
    border: 2px solid #333;
    display: inline-block;
  }

  .component-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
    background: #111;
    padding: 5px 10px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* ── Field Graphic canvas ── */
  .field-graphic-canvas {
    width: 200px;
    height: 60px;
    background: var(--overlay-bg);
    border: 1px solid var(--overlay-border);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 12px;
    gap: 4px;
  }

  /* Left accent line */
  .field-graphic-canvas::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    bottom: 0;
    background: var(--white);
    opacity: 0.5;
  }

  .fg-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }

  .fg-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-500);
    white-space: nowrap;
  }

  .fg-value {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.01em;
    line-height: 1;
    white-space: nowrap;
  }

  .fg-value-sm {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-300);
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .fg-divider {
    width: 100%;
    height: 1px;
    background: var(--gray-800);
    margin: 2px 0;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="component">
  <div class="component-label">FIELD GRAPHIC — Standard</div>
  <div class="field-graphic-canvas">
    <div class="fg-row">
      <span class="fg-label">Players</span>
      <span class="fg-value">8 / 120</span>
    </div>
    <div class="fg-row">
      <span class="fg-label">Avg Stack</span>
      <span class="fg-value-sm">37,500</span>
    </div>
  </div>
</div>
</body>
</html>
