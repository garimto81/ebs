<!DOCTYPE html>
<!-- Component: Strip — Standard (480×25px) -->
<!-- Style: B&W Monochrome, Player Summary Bar -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<title>EBS Component — Strip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #2a2a2a;
    --gray-900: #1a1a1a;
    --overlay-bg: rgba(15, 15, 15, 0.88);
    --overlay-border: rgba(200, 200, 200, 0.35);
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
  }

  html { background: #333; }

  body {
    display: inline-block;
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: var(--font-mono);
    color: var(--white);
  }

  .component {
    border: 2px solid #333;
    display: inline-block;
  }

  .component-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
    background: #111;
    padding: 5px 10px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* ── Strip canvas ── */
  .strip-canvas {
    width: 480px;
    height: 25px;
    background: var(--overlay-bg);
    border-bottom: 1px solid var(--overlay-border);
    display: flex;
    align-items: center;
    overflow: hidden;
    padding: 0;
    position: relative;
  }

  /* Bottom accent */
  .strip-canvas::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }

  /* LIVE label */
  .strip-live-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray-400);
    white-space: nowrap;
    padding: 0 8px;
    border-right: 1px solid var(--gray-700);
    height: 100%;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
  }

  /* Players container */
  .strip-players {
    display: flex;
    align-items: center;
    flex: 1;
    overflow: hidden;
    height: 100%;
  }

  /* Individual player segment */
  .strip-player {
    display: flex;
    align-items: center;
    padding: 0 7px;
    height: 100%;
    border-right: 1px solid var(--gray-800);
    white-space: nowrap;
    gap: 3px;
    flex-shrink: 0;
  }

  .strip-player:last-child {
    border-right: none;
  }

  .strip-player-name {
    font-family: var(--font-mono);
    font-size: 8.5px;
    font-weight: 500;
    color: var(--gray-300);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .strip-player-sep {
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--gray-700);
  }

  .strip-player-stack {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.01em;
  }

  /* Folded player */
  .strip-player.folded .strip-player-name,
  .strip-player.folded .strip-player-stack {
    color: var(--gray-600);
    text-decoration: line-through;
    text-decoration-color: var(--gray-700);
  }

  .strip-player.folded .strip-player-sep {
    color: var(--gray-800);
  }
</style>
</head>
<body>
<div class="component">
  <div class="component-label">STRIP — Standard</div>
  <div class="strip-canvas">

    <!-- LIVE label -->
    <span class="strip-live-label">LIVE</span>

    <!-- Player summary list -->
    <div class="strip-players">

      <div class="strip-player">
        <span class="strip-player-name">Smith</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">45K</span>
      </div>

      <div class="strip-player">
        <span class="strip-player-name">Garcia</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">98K</span>
      </div>

      <div class="strip-player">
        <span class="strip-player-name">Yuki</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">76K</span>
      </div>

      <div class="strip-player">
        <span class="strip-player-name">Lee</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">55K</span>
      </div>

      <!-- 폴드된 플레이어 -->
      <div class="strip-player folded">
        <span class="strip-player-name">Park</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">22K</span>
      </div>

      <div class="strip-player">
        <span class="strip-player-name">Kim</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">41K</span>
      </div>

      <!-- 폴드된 플레이어 -->
      <div class="strip-player folded">
        <span class="strip-player-name">Choi</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">18K</span>
      </div>

      <div class="strip-player">
        <span class="strip-player-name">Jung</span>
        <span class="strip-player-sep">·</span>
        <span class="strip-player-stack">67K</span>
      </div>

    </div>

  </div>
</div>
</body>
</html>
