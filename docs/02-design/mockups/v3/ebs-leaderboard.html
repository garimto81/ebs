<!DOCTYPE html>
<!-- Component: Leaderboard — Standard (400×300px) -->
<!-- Style: B&W Monochrome, Broadcast Overlay -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<title>EBS Component — Leaderboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-200: #e0e0e0;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #2a2a2a;
    --gray-900: #1a1a1a;
    --overlay-bg: rgba(15, 15, 15, 0.88);
    --overlay-border: rgba(200, 200, 200, 0.35);
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }

  html { background: #333; }

  body {
    display: inline-block;
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: var(--font-sans);
    color: var(--white);
  }

  .component {
    border: 2px solid #333;
    display: inline-block;
  }

  .component-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
    background: #111;
    padding: 5px 10px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* ── Leaderboard canvas ── */
  .leaderboard-canvas {
    width: 400px;
    background: var(--overlay-bg);
    border: 1px solid var(--overlay-border);
    overflow: hidden;
    position: relative;
  }

  /* Top accent */
  .leaderboard-canvas::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--white);
    opacity: 0.5;
  }

  /* Title header */
  .lb-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--gray-700);
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .lb-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
  }

  .lb-badge {
    font-family: var(--font-mono);
    font-size: 7px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-600);
    border: 1px solid var(--gray-700);
    padding: 2px 6px;
  }

  /* Column header row */
  .lb-col-header {
    display: grid;
    grid-template-columns: 38px 1fr 80px 60px;
    align-items: center;
    padding: 5px 14px;
    background: rgba(0,0,0,0.35);
    border-bottom: 1px solid var(--gray-800);
    gap: 0;
  }

  .lb-col-label {
    font-family: var(--font-mono);
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray-600);
  }

  .lb-col-label.right {
    text-align: right;
  }

  /* Data rows */
  .lb-row {
    display: grid;
    grid-template-columns: 38px 1fr 80px 60px;
    align-items: center;
    padding: 7px 14px;
    border-bottom: 1px solid var(--gray-800);
    gap: 0;
    position: relative;
    transition: background 0.1s;
  }

  /* 1위 강조 */
  .lb-row.rank-1 {
    background: var(--white);
  }

  .lb-row.rank-1 .lb-rank,
  .lb-row.rank-1 .lb-player-name,
  .lb-row.rank-1 .lb-stack,
  .lb-row.rank-1 .lb-wins {
    color: var(--black);
  }

  .lb-row.rank-1 .lb-player-flag {
    color: var(--gray-700);
  }

  .lb-row:last-child {
    border-bottom: none;
  }

  .lb-rank {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: -0.01em;
  }

  .lb-row.rank-1 .lb-rank {
    color: var(--black);
    font-size: 14px;
  }

  .lb-player {
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 0;
  }

  .lb-player-flag {
    font-family: var(--font-mono);
    font-size: 7px;
    color: var(--gray-600);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--gray-700);
    padding: 1px 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .lb-player-name {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 600;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.01em;
  }

  .lb-stack {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-300);
    text-align: right;
    letter-spacing: -0.01em;
  }

  .lb-wins {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-400);
    text-align: right;
    letter-spacing: 0;
  }

  /* Footer */
  .lb-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid var(--gray-800);
  }

  .lb-footer-text {
    font-family: var(--font-mono);
    font-size: 7.5px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-600);
  }
</style>
</head>
<body>
<div class="component">
  <div class="component-label">LEADERBOARD — Standard</div>
  <div class="leaderboard-canvas">

    <!-- Title header -->
    <div class="lb-header">
      <span class="lb-title">Leaderboard</span>
      <span class="lb-badge">Day 2 · Level 12</span>
    </div>

    <!-- Column headers -->
    <div class="lb-col-header">
      <span class="lb-col-label">Rank</span>
      <span class="lb-col-label">Player</span>
      <span class="lb-col-label right">Stack</span>
      <span class="lb-col-label right">Wins</span>
    </div>

    <!-- Row 1 — highlighted (1위) -->
    <div class="lb-row rank-1">
      <span class="lb-rank">1</span>
      <div class="lb-player">
        <span class="lb-player-flag">[US]</span>
        <span class="lb-player-name">John Smith</span>
      </div>
      <span class="lb-stack">125K</span>
      <span class="lb-wins">5</span>
    </div>

    <!-- Row 2 -->
    <div class="lb-row">
      <span class="lb-rank">2</span>
      <div class="lb-player">
        <span class="lb-player-flag">[ES]</span>
        <span class="lb-player-name">Maria Garcia</span>
      </div>
      <span class="lb-stack">98K</span>
      <span class="lb-wins">3</span>
    </div>

    <!-- Row 3 -->
    <div class="lb-row">
      <span class="lb-rank">3</span>
      <div class="lb-player">
        <span class="lb-player-flag">[JP]</span>
        <span class="lb-player-name">Tanaka Yuki</span>
      </div>
      <span class="lb-stack">76K</span>
      <span class="lb-wins">2</span>
    </div>

    <!-- Row 4 -->
    <div class="lb-row">
      <span class="lb-rank">4</span>
      <div class="lb-player">
        <span class="lb-player-flag">[KR]</span>
        <span class="lb-player-name">Lee Junho</span>
      </div>
      <span class="lb-stack">55K</span>
      <span class="lb-wins">2</span>
    </div>

    <!-- Row 5 -->
    <div class="lb-row">
      <span class="lb-rank">5</span>
      <div class="lb-player">
        <span class="lb-player-flag">[KR]</span>
        <span class="lb-player-name">Kim Sujin</span>
      </div>
      <span class="lb-stack">41K</span>
      <span class="lb-wins">1</span>
    </div>

    <!-- Row 6 -->
    <div class="lb-row">
      <span class="lb-rank">6</span>
      <div class="lb-player">
        <span class="lb-player-flag">[DE]</span>
        <span class="lb-player-name">Müller Hans</span>
      </div>
      <span class="lb-stack">38K</span>
      <span class="lb-wins">1</span>
    </div>

    <!-- Footer -->
    <div class="lb-footer">
      <span class="lb-footer-text">8 Players Remaining</span>
      <span class="lb-footer-text">Hand #247</span>
    </div>

  </div>
</div>
</body>
</html>
