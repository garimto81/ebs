<!DOCTYPE html>
<!-- Component: Player Graphic — Standard (280×180px) -->
<!-- Style: B&W Monochrome, Glassmorphism, Broadcast Overlay -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<title>EBS Component — Player Graphic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-200: #e0e0e0;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #2a2a2a;
    --gray-900: #1a1a1a;
    --overlay-bg: rgba(15, 15, 15, 0.88);
    --overlay-bg-mid: rgba(30, 30, 30, 0.82);
    --overlay-border: rgba(200, 200, 200, 0.35);
    --overlay-border-bright: rgba(255, 255, 255, 0.7);
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }

  html { background: #333; }

  body {
    display: inline-block;
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: var(--font-sans);
    color: var(--white);
  }

  /* ── Component wrapper ── */
  .component {
    border: 2px solid #333;
    display: inline-block;
  }

  /* ── Component label ── */
  .component-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
    background: #111;
    padding: 5px 10px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* ── Player Graphic canvas ── */
  .player-graphic-canvas {
    width: 280px;
    height: 180px;
    background: rgba(20, 20, 20, 0.95);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Top section: photo + info */
  .pg-top {
    display: flex;
    align-items: stretch;
    background: var(--overlay-bg);
    border-bottom: 1px solid var(--gray-800);
    flex-shrink: 0;
  }

  /* Avatar / Photo */
  .pg-avatar {
    width: 80px;
    height: 80px;
    background: var(--gray-800);
    border-right: 1px solid var(--gray-700);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .pg-avatar-inner {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--gray-700);
    border: 2px solid var(--gray-500);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pg-avatar-initial {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-300);
    letter-spacing: 0.05em;
  }

  /* Info panel */
  .pg-info {
    flex: 1;
    padding: 10px 12px 8px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .pg-info-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 4px;
  }

  .pg-name {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pg-badges {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
    align-items: center;
  }

  .pg-flag {
    font-family: var(--font-mono);
    font-size: 7px;
    color: var(--gray-500);
    letter-spacing: 0.05em;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--gray-700);
    padding: 1px 4px;
  }

  .pg-position {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 2px 5px;
  }

  .pg-stack-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .pg-stack-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-600);
  }

  .pg-stack-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* Bottom section: hole cards + action */
  .pg-cards-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid var(--gray-800);
    flex-shrink: 0;
  }

  .hole-cards {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .hole-card {
    width: 30px;
    height: 40px;
    background: var(--white);
    border: 1px solid var(--gray-300);
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .hole-card-rank {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--black);
    line-height: 1;
  }

  .hole-card-suit {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--black);
    line-height: 1;
  }

  .hole-card.gray-suit .hole-card-rank,
  .hole-card.gray-suit .hole-card-suit {
    color: var(--gray-600);
  }

  .pg-action {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 1px;
  }

  .pg-action-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
    border-left: 2px solid var(--white);
    padding-left: 6px;
    line-height: 1.3;
  }

  .pg-action-amount {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.01em;
    padding-left: 8px;
  }

  /* Equity bar */
  .pg-equity {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 12px;
    gap: 4px;
    background: rgba(0,0,0,0.3);
  }

  .pg-equity-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .pg-equity-label {
    font-family: var(--font-mono);
    font-size: 7.5px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
  }

  .pg-equity-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-300);
    letter-spacing: 0.05em;
  }

  .pg-equity-bar-track {
    width: 100%;
    height: 4px;
    background: var(--gray-800);
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }

  .pg-equity-bar-fill {
    height: 100%;
    width: 62%;
    background: var(--white);
    opacity: 0.85;
  }

  /* Active top accent */
  .player-graphic-canvas::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--white);
    opacity: 0.7;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="component">
  <div class="component-label">PLAYER GRAPHIC — Standard (280×180)</div>
  <div class="player-graphic-canvas">

    <!-- Top: Avatar + Info -->
    <div class="pg-top">
      <div class="pg-avatar">
        <div class="pg-avatar-inner">
          <span class="pg-avatar-initial">JS</span>
        </div>
      </div>
      <div class="pg-info">
        <div class="pg-info-top">
          <span class="pg-name">John Smith</span>
          <div class="pg-badges">
            <span class="pg-flag">[FL]</span>
            <span class="pg-position">BTN</span>
          </div>
        </div>
        <div class="pg-stack-row">
          <span class="pg-stack-label">Stack</span>
          <span class="pg-stack-value">45,200</span>
        </div>
      </div>
    </div>

    <!-- Hole Cards + Action -->
    <div class="pg-cards-action">
      <div class="hole-cards">
        <div class="hole-card black-suit">
          <span class="hole-card-rank">A</span>
          <span class="hole-card-suit">♠</span>
        </div>
        <div class="hole-card gray-suit">
          <span class="hole-card-rank">K</span>
          <span class="hole-card-suit">♦</span>
        </div>
      </div>
      <div class="pg-action">
        <span class="pg-action-label">RAISE</span>
        <span class="pg-action-amount">500</span>
      </div>
    </div>

    <!-- Equity Bar (올인 시) -->
    <div class="pg-equity">
      <div class="pg-equity-label-row">
        <span class="pg-equity-label">Equity (All-in)</span>
        <span class="pg-equity-pct">62%</span>
      </div>
      <div class="pg-equity-bar-track">
        <div class="pg-equity-bar-fill"></div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
