<!DOCTYPE html>
<!-- Style Reference: Brutalist B&W — Seat Template B: Hexagonal (Grid-Based) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
<title>EBS Seat Template B — Hexagonal — B&W Mockup v3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; background: #fff; display: inline-block; }

  .component {
    width: 720px;
    background: #fff;
    border: 3px solid #000;
    font-family: 'Noto Sans', sans-serif;
  }

  .header {
    background: #000;
    color: #fff;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.15em;
    border-bottom: 3px solid #000;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header .sub {
    font-size: 10px;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }

  .grid-wrap { padding: 16px; overflow-x: auto; }

  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 11px;
    font-family: 'Noto Sans', sans-serif;
  }

  th, td {
    border: 1px solid #000;
    width: 48px;
    height: 40px;
    text-align: center;
    vertical-align: middle;
    font-weight: bold;
  }

  th {
    background: #000;
    color: #fff;
    font-size: 10px;
    height: 28px;
    letter-spacing: 0.05em;
  }

  td.row-header {
    background: #000;
    color: #fff;
    font-size: 10px;
    width: 36px;
  }

  td.empty { background: #fff; }

  td.board {
    background: #000;
    color: #fff;
    font-size: 9px;
    letter-spacing: 0.05em;
  }

  td.board-label {
    font-size: 9px;
    letter-spacing: 0.04em;
  }

  td.pot {
    background: #ccc;
    color: #000;
    font-size: 9px;
    letter-spacing: 0.04em;
  }

  td.seat {
    background: #000;
    color: #fff;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .legend {
    display: flex;
    gap: 24px;
    padding: 12px 16px;
    border-top: 2px solid #000;
    font-size: 11px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-swatch {
    width: 20px;
    height: 14px;
    border: 1px solid #000;
  }

  .swatch-seat  { background: #000; }
  .swatch-board { background: #000; }
  .swatch-pot   { background: #ccc; }
  .swatch-empty { background: #fff; }
</style>
</head>
<body>
<div class="component">
  <div class="header">
    EBS / SEAT TEMPLATE B — HEXAGONAL
    <span class="sub">8 PLAYERS</span>
  </div>
  <div class="grid-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>C1</th><th>C2</th><th>C3</th><th>C4</th>
          <th>C5</th><th>C6</th><th>C7</th><th>C8</th>
          <th>C9</th><th>C10</th><th>C11</th><th>C12</th>
        </tr>
      </thead>
      <tbody>
        <!-- R1 -->
        <tr>
          <td class="row-header">R1</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
        </tr>
        <!-- R2: P4(C4), P5(C9) -->
        <tr>
          <td class="row-header">R2</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="seat">P4</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="seat">P5</td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
        </tr>
        <!-- R3: P3(C2), P6(C11) -->
        <tr>
          <td class="row-header">R3</td>
          <td class="empty"></td><td class="seat">P3</td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="seat">P6</td><td class="empty"></td>
        </tr>
        <!-- R4: BOARD CARDS (C5-C8) -->
        <tr>
          <td class="row-header">R4</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="board board-label" colspan="4">BOARD CARDS</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
        </tr>
        <!-- R5: POT (C6-C7) -->
        <tr>
          <td class="row-header">R5</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td>
          <td class="pot" colspan="2">POT</td>
          <td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
        </tr>
        <!-- R6: P2(C2), P7(C11) -->
        <tr>
          <td class="row-header">R6</td>
          <td class="empty"></td><td class="seat">P2</td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="seat">P7</td><td class="empty"></td>
        </tr>
        <!-- R7: P1(C4), P8(C9) -->
        <tr>
          <td class="row-header">R7</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="seat">P1</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="seat">P8</td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
        </tr>
        <!-- R8 -->
        <tr>
          <td class="row-header">R8</td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
          <td class="empty"></td><td class="empty"></td><td class="empty"></td><td class="empty"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch swatch-seat"></div>
      <span>SEAT (P1–P8)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-board"></div>
      <span>BOARD CARDS</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-pot"></div>
      <span>POT</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-empty"></div>
      <span>EMPTY</span>
    </div>
  </div>
</div>
</body>
</html>
