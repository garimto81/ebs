<!DOCTYPE html>
<!-- Component: Board Graphic — Standard (480×200px) -->
<!-- Style: B&W Monochrome, Broadcast Overlay -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480">
<title>EBS Component — Board Graphic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-200: #e0e0e0;
    --gray-300: #cccccc;
    --gray-400: #aaaaaa;
    --gray-500: #888888;
    --gray-600: #666666;
    --gray-700: #444444;
    --gray-800: #2a2a2a;
    --gray-900: #1a1a1a;
    --overlay-bg: rgba(15, 15, 15, 0.88);
    --overlay-border: rgba(200, 200, 200, 0.35);
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
  }

  html { background: #333; }

  body {
    display: inline-block;
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: var(--font-sans);
    color: var(--white);
  }

  .component {
    border: 2px solid #333;
    display: inline-block;
  }

  .component-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-600);
    background: #111;
    padding: 5px 10px;
    border-bottom: 1px solid #2a2a2a;
  }

  /* ── Board Graphic canvas ── */
  .board-graphic-canvas {
    width: 480px;
    background: var(--overlay-bg);
    border: 1px solid var(--overlay-border);
    position: relative;
    overflow: hidden;
  }

  /* Top accent line */
  .board-graphic-canvas::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--white);
    opacity: 0.5;
  }

  /* Header row */
  .bg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--gray-800);
    background: rgba(0,0,0,0.45);
  }

  .bg-header-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray-500);
  }

  .bg-pot-block {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .bg-pot-label {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-500);
  }

  .bg-pot-currency {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
  }

  .bg-pot-amount {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    color: var(--white);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  /* Cards row */
  .bg-cards-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 20px;
    gap: 8px;
  }

  .card {
    width: 52px;
    height: 72px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    gap: 1px;
  }

  .card.empty {
    background: rgba(50,50,50,0.5);
    border: 1px dashed var(--gray-700);
    box-shadow: none;
  }

  .card-rank {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--black);
    line-height: 1;
  }

  .card-suit {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--black);
    line-height: 1;
  }

  .card.gray-suit .card-rank,
  .card.gray-suit .card-suit {
    color: var(--gray-600);
  }

  .card-dot-empty {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid var(--gray-600);
    background: transparent;
  }

  .card-separator {
    width: 1px;
    height: 50px;
    background: var(--gray-800);
    margin: 0 4px;
  }

  /* Side pots row */
  .bg-side-pots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    border-top: 1px solid var(--gray-800);
    border-bottom: 1px solid var(--gray-800);
    background: rgba(0,0,0,0.3);
    padding: 6px 0;
  }

  .bg-side-pot {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 20px;
    border-right: 1px solid var(--gray-800);
  }

  .bg-side-pot:last-child {
    border-right: none;
  }

  .bg-side-pot-label {
    font-family: var(--font-mono);
    font-size: 7.5px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-600);
  }

  .bg-side-pot-value {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-300);
  }

  /* Hand description */
  .bg-hand-desc {
    padding: 8px 16px 10px;
    text-align: center;
    background: rgba(0,0,0,0.2);
  }

  .bg-hand-text {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-300);
    font-style: italic;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="component">
  <div class="component-label">BOARD GRAPHIC — Standard (480×200)</div>
  <div class="board-graphic-canvas">

    <!-- Header: Community Cards label + POT -->
    <div class="bg-header">
      <span class="bg-header-label">Community Cards</span>
      <div class="bg-pot-block">
        <span class="bg-pot-label">POT</span>
        <span class="bg-pot-currency">₩</span>
        <span class="bg-pot-amount">12,500</span>
      </div>
    </div>

    <!-- 5 Community Cards -->
    <div class="bg-cards-row">
      <!-- Flop -->
      <div class="card black-suit">
        <span class="card-rank">A</span>
        <span class="card-suit">♠</span>
      </div>
      <div class="card gray-suit">
        <span class="card-rank">K</span>
        <span class="card-suit">♦</span>
      </div>
      <div class="card black-suit">
        <span class="card-rank">7</span>
        <span class="card-suit">♣</span>
      </div>

      <div class="card-separator"></div>

      <!-- Turn / River (미공개) -->
      <div class="card empty">
        <div class="card-dot-empty"></div>
      </div>
      <div class="card empty">
        <div class="card-dot-empty"></div>
      </div>
    </div>

    <!-- Side Pots -->
    <div class="bg-side-pots">
      <div class="bg-side-pot">
        <span class="bg-side-pot-label">Side Pot 1</span>
        <span class="bg-side-pot-value">3,200</span>
      </div>
      <div class="bg-side-pot">
        <span class="bg-side-pot-label">Side Pot 2</span>
        <span class="bg-side-pot-value">800</span>
      </div>
    </div>

    <!-- Hand description -->
    <div class="bg-hand-desc">
      <span class="bg-hand-text">"Full House, Aces over Kings"</span>
    </div>

  </div>
</div>
</body>
</html>
