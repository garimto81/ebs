<!DOCTYPE html>
<!-- Style Reference: Brutalist B&W — AT Individual Seat Cell Component (행 750-758 기반) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>EBS AT — Seat Cell</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { margin: 0; padding: 0; background: #fff; display: inline-block; }

  .component {
    width: 600px;
    background: #fff;
    border: 3px solid #000;
    font-family: 'Courier New', 'Lucida Console', monospace;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #999; border-bottom: 1px solid #e0e0e0; padding-bottom: 8px;
    margin-bottom: 4px;
  }

  .seats-row {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start;
  }

  /* ===== SEAT CELL BASE ===== */
  .seat-cell {
    width: 140px;
    display: flex; flex-direction: column;
    text-align: center;
  }

  .seat-cell__cards {
    display: flex; justify-content: center; gap: 4px; margin-bottom: 5px;
  }
  .hole-card {
    width: 26px; height: 36px;
    border: 1.5px solid #000; border-radius: 2px; background: #000;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 1px 1px 0 #555; font-size: 8px; color: #fff;
    flex-shrink: 0;
  }
  .hole-card--revealed {
    background: #fff; color: #000; border-color: #000;
    font-size: 10px; font-weight: 900; flex-direction: column; gap: 0;
  }

  .seat-cell__box {
    border: 2px solid #000; background: #fff;
    padding: 8px 8px 6px;
    box-shadow: 4px 4px 0 #000;
    position: relative; cursor: pointer;
  }
  .seat-cell__box:hover { box-shadow: 5px 5px 0 #000; transform: translate(-1px,-1px); }

  .seat-cell__header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .seat-num {
    font-size: 9px; font-weight: 900; letter-spacing: 0.06em;
    color: #888; text-transform: uppercase;
  }
  .badges { display: flex; gap: 2px; }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 900; letter-spacing: 0.04em;
    border: 1.5px solid #000; border-radius: 50%;
    width: 18px; height: 18px;
    background: #000; color: #fff;
  }
  .badge--sb { background: #555; }

  .seat-cell__name {
    font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px; text-align: left;
  }
  .seat-cell__stack {
    font-size: 10px; color: #444; text-align: left; letter-spacing: 0.02em;
  }
  .seat-cell__stack strong { font-weight: 900; color: #000; }
  .seat-cell__bet {
    font-size: 9px; color: #666; text-align: left; letter-spacing: 0.02em; margin-top: 1px;
  }
  .seat-cell__status {
    display: inline-block; font-size: 8px; font-weight: 900;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 4px; padding: 1px 6px;
    border: 1px solid #000;
    background: #000; color: #fff;
  }

  /* State variants */
  /* Active: default border+shadow */

  /* Action-on */
  .seat-cell--action-on .seat-cell__box {
    background: #000; color: #fff; border-width: 3px;
    box-shadow: 5px 5px 0 #555;
    animation: action-glow 0.8s ease-in-out infinite alternate;
  }
  @keyframes action-glow {
    0%  { box-shadow: 5px 5px 0 #555; }
    100%{ box-shadow: 6px 6px 0 #aaa; }
  }
  .seat-cell--action-on .seat-cell__name { color: #fff; }
  .seat-cell--action-on .seat-cell__stack { color: #ccc; }
  .seat-cell--action-on .seat-cell__stack strong { color: #fff; }
  .seat-cell--action-on .seat-num { color: #aaa; }

  /* Folded */
  .seat-cell--folded { opacity: 0.5; }
  .seat-cell--folded .seat-cell__box { background: #e8e8e8; border-color: #aaa; box-shadow: 2px 2px 0 #aaa; }
  .seat-cell--folded .seat-cell__status { background: #999; border-color: #999; }

  /* Empty */
  .seat-cell--empty .seat-cell__box {
    border-style: dashed; border-color: #ccc;
    background: #fafafa; box-shadow: none; color: #bbb;
  }

  /* All-in */
  .seat-cell--allin .seat-cell__box { background: #000; color: #fff; border-width: 3px; }
  .seat-cell--allin .seat-cell__name { color: #fff; }
  .seat-cell--allin .seat-cell__stack { color: #aaa; }
  .seat-cell--allin .seat-cell__stack strong { color: #fff; }
</style>
</head>
<body>
<div class="component">

  <div class="section-label">Active States — Seat Cell Component</div>

  <!-- ROW 1: Active / Action-on / Folded -->
  <div class="seats-row">

    <!-- ACTIVE -->
    <div class="seat-cell">
      <div class="seat-cell__cards">
        <div class="hole-card">?</div>
        <div class="hole-card">?</div>
      </div>
      <div class="seat-cell__box">
        <div class="seat-cell__header">
          <span class="seat-num">SEAT 3</span>
          <div class="badges"><span class="badge">BTN</span></div>
        </div>
        <div class="seat-cell__name">M. Park</div>
        <div class="seat-cell__stack">Stack: <strong>8,400</strong></div>
        <div class="seat-cell__bet">Bet: 200</div>
      </div>
    </div>

    <!-- ACTION-ON -->
    <div class="seat-cell seat-cell--action-on">
      <div class="seat-cell__cards">
        <div class="hole-card">?</div>
        <div class="hole-card">?</div>
      </div>
      <div class="seat-cell__box">
        <div class="seat-cell__header">
          <span class="seat-num">SEAT 5</span>
          <div class="badges"><span class="badge badge--sb">SB</span></div>
        </div>
        <div class="seat-cell__name">J. Kim</div>
        <div class="seat-cell__stack">Stack: <strong>22,100</strong></div>
        <div class="seat-cell__bet">Bet: 400</div>
        <div style="margin-top:4px;font-size:8px;font-weight:900;letter-spacing:0.12em;color:#aaa;">ACTION ON!</div>
      </div>
    </div>

    <!-- FOLDED -->
    <div class="seat-cell seat-cell--folded">
      <div class="seat-cell__box">
        <div class="seat-cell__header">
          <span class="seat-num">SEAT 7</span>
          <div class="badges"></div>
        </div>
        <div class="seat-cell__name">K. Choi</div>
        <div class="seat-cell__stack">Stack: <strong>5,200</strong></div>
        <div class="seat-cell__bet"></div>
        <div><span class="seat-cell__status">FOLDED</span></div>
      </div>
    </div>

  </div>

  <div class="section-label">Other States</div>

  <!-- ROW 2: All-in / Empty / Sitting Out -->
  <div class="seats-row">

    <!-- ALL-IN -->
    <div class="seat-cell seat-cell--allin">
      <div class="seat-cell__cards">
        <div class="hole-card hole-card--revealed">
          <span style="font-size:12px;font-weight:900;">A</span>
          <span style="font-size:9px;">♠</span>
        </div>
        <div class="hole-card hole-card--revealed">
          <span style="font-size:12px;font-weight:900;">K</span>
          <span style="font-size:9px;">♠</span>
        </div>
      </div>
      <div class="seat-cell__box">
        <div class="seat-cell__header">
          <span class="seat-num" style="color:#aaa">SEAT 2</span>
          <div class="badges"></div>
        </div>
        <div class="seat-cell__name">H. Shin</div>
        <div class="seat-cell__stack">Stack: <strong>0</strong></div>
        <div style="margin-top:4px;font-size:8px;font-weight:900;letter-spacing:0.15em;color:#fff;border:1px solid #555;padding:1px 6px;display:inline-block;">ALL-IN</div>
      </div>
    </div>

    <!-- EMPTY -->
    <div class="seat-cell seat-cell--empty">
      <div class="seat-cell__box">
        <div class="seat-cell__header">
          <span class="seat-num" style="color:#ccc">SEAT 9</span>
          <div class="badges"></div>
        </div>
        <div style="font-size:11px;color:#ccc;letter-spacing:0.12em;text-transform:uppercase;padding:8px 0;">EMPTY</div>
      </div>
    </div>

    <!-- SITTING OUT -->
    <div class="seat-cell">
      <div class="seat-cell__box" style="background:#eee;border-color:#999;box-shadow:3px 3px 0 #999;">
        <div class="seat-cell__header">
          <span class="seat-num">SEAT 6</span>
          <div class="badges"></div>
        </div>
        <div class="seat-cell__name" style="color:#666;">D. Yoon</div>
        <div class="seat-cell__stack">Stack: <strong>30,000</strong></div>
        <div style="margin-top:4px;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#888;border:1px solid #aaa;padding:1px 6px;display:inline-block;">SITTING OUT</div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
